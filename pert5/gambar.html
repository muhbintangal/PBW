<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            padding: 50px;
            background-color: #f4f4f4;
        }

        .gallery-container {
            display: grid;
            /* Creates 3 columns of equal width */
            grid-template-columns: repeat(3, 1fr);
            /* The spacing between the images */
            gap: 15px;
            max-width: 900px;
            width: 100%;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            /* Ensures the image fills the square without stretching */
            object-fit: cover;
            /* Keeps the images perfectly square like in your image */
            aspect-ratio: 1 / 1;
            display: block;
        }

        /* Optional: Add a hover effect for a professional touch */
        .gallery-item img:hover {
            opacity: 0.8;
            transition: 0.3s ease;
            cursor: pointer;
        }

        /* Responsive: Change to 2 columns on tablets and 1 on phones */
        @media (max-width: 768px) {
            .gallery-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .gallery-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="gallery-container">
        <div class="gallery-item"><img src="asset/img/box.jpg" alt="Fruit 1"></div>
        <div class="gallery-item"><img src="asset/img/box.jpg" alt="Fruit 2"></div>
        <div class="gallery-item"><img src="asset/img/box.jpg" alt="Fruit 3"></div>
        <div class="gallery-item"><img src="asset/img/box.jpg" alt="Fruit 4"></div>
        <div class="gallery-item"><img src="asset/img/box.jpg" alt="Fruit 5"></div>
        <div class="gallery-item"><img src="asset/img/box.jpg" alt="Fruit 6"></div>
    </div>

</body>

</html>
